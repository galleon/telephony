; Asterisk WebSocket client config for ARI External Media.
; Copy to websocket_client.conf and set DGX_IP to your DGX Spark's IP (as seen from the Asterisk host).
;
; The agent on the DGX runs a Media WebSocket server. When a call enters Stasis,
; Asterisk creates an External Media channel and connects here for audio.

[media_connection1]
type = websocket_client
; Replace DGX_IP with your DGX Spark's IP (e.g. 192.168.1.50)
uri = ws://DGX_IP:8787/media
protocols = media
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 1000
reconnect_attempts = 3
tls_enabled = no
