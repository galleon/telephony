[internal]
exten => 600,1,NoOp(Incoming AI Call)
 same => n,Stasis(ai-assistant,incoming)
 same => n,Hangup()

exten => 601,1,NoOp(Echo test - WebSocket)
 same => n,Answer()
 same => n,Dial(WebSocket/echo_test/c(ulaw))
 same => n,Hangup()

; RTP test - no WebSocket (if you hear this, RTP works; problem is bridge)
exten => 602,1,NoOp(RTP test - Playback)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; Inbound from third-party SIP trunk - route to AI
[from-trunk]
exten => _X.,1,NoOp(Incoming call from provider)
 same => n,Stasis(ai-assistant,incoming)
 same => n,Hangup()
