[internal]
exten => 600,1,NoOp(Incoming AI Call)
 same => n,Answer()
 same => n,Stasis(ai-assistant,incoming)
 same => n,Hangup()

; Inbound from third-party SIP trunk - route to AI
[from-trunk]
exten => _X.,1,NoOp(Incoming call from provider)
 same => n,Answer()
 same => n,Stasis(ai-assistant,incoming)
 same => n,Hangup()
