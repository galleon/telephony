[general]
enabled = yes
pretty = yes
allowed_origins = *
; ai-assistant is served by INBOUND ARI (DGX connects to Asterisk).
; Do NOT add an [outbound_websocket] section for ai-assistant here.
; Asterisk 22: if the app isn't registered when Stasis() runs, it looks for
; a per-call outbound config and fails with "Failed to find outbound websocket
; per-call config". Ensure the DGX agent is running and connected before calls.

[ai_user]
type = user
read_only = no
password = your_password
password_format = plain
