; Asterisk uses this for External Media WebSocket (audio to DGX).
; Replace 192.168.1.72 with your DGX Spark's IP (as seen from the Mac).

[media_connection1]
type = websocket_client
uri = ws://192.168.1.72:8787/media
protocols = media
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 1000
reconnect_attempts = 3
tls_enabled = no

; Echo test (mow_echo_test_server.py) - use when agent is stopped
[echo_test]
type = websocket_client
uri = ws://192.168.1.72:8787
protocols = media
username = medianame
password = mediapassword
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 1000
reconnect_attempts = 3
tls_enabled = no
