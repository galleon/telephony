; Asterisk uses this for External Media WebSocket (audio to DGX).
; Replace DGX_IP with your DGX Spark's IP as seen from the Mac (e.g. 192.168.1.50).
; The agent creates External Media channels with external_host=media_connection1
; when DGX_IP/SPARK_IP aren't set, or with host:port when they are.

[media_connection1]
type = websocket_client
uri = ws://DGX_IP:8787/media
protocols = media
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 1000
reconnect_attempts = 3
tls_enabled = no
