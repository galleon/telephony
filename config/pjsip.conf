[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Required for Docker: LAN phones must reach the Asterisk host's LAN IP, not the container IP
external_signaling_address=192.168.1.23
external_media_address=192.168.1.23
local_net=192.168.1.0/24
local_net=172.16.0.0/12
local_net=127.0.0.1/32

[6001]
type=auth
auth_type=userpass
username=6001
password=password123

[6001]
type=aor
max_contacts=1
remove_existing=yes

[6001]
type=endpoint
context=internal
disallow=all
allow=ulaw,opus
; --- REPAIR: Point to the [6001] auth section ---
auth=6001
aors=6001
force_rport=yes
rewrite_contact=yes
