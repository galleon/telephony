[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; --- Internal Test User (Linphone) ---
[6001]
type=endpoint
context=internal
disallow=all
allow=ulaw,opus
auth=6001-auth
aors=6001-aor

[6001-auth]
type=auth
auth_type=password
password=password123
username=6001

[6001-aor]
type=aor
max_contacts=1

; --- Third-party SIP trunk (Twilio, VoIP.ms, Telnyx, SIP.us, etc.) ---
; Uncomment and fill in your provider's details. Inbound calls hit from-trunk.

;[provider-reg]
;type=registration
;outbound_auth=provider-auth
;server_uri=sip:your-provider.com
;client_uri=sip:YOUR_NUMBER@your-provider.com
;retry_interval=60

;[provider-auth]
;type=auth
;auth_type=userpass
;username=YOUR_USERNAME
;password=YOUR_PASSWORD

;[provider-aor]
;type=aor
;max_contacts=1

;[provider-trunk]
;type=endpoint
;context=from-trunk
;disallow=all
;allow=ulaw,opus,g722
;aors=provider-aor
;outbound_auth=provider-auth
