# Run on DGX Spark. Starts vLLM + voice agent.
# Prereqs: .env with MAC_IP, ARI_USER, ARI_PASS; websocket_client.conf points to this host.
#
# Usage:
#   cd agent && docker compose up -d
#
# Asterisk (on Mac) must be running first. Start order: 1) Asterisk, 2) this compose.

x-vllm: &vllm
  image: nvcr.io/nvidia/vllm:26.02-py3
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"
  healthcheck:
    test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=10)"]
    interval: 15s
    timeout: 10s
    retries: 20
    start_period: 300s

services:
  vllm:
    <<: *vllm
    container_name: sentinel-vllm
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8000:8000"
    command: >
      vllm serve Qwen/Qwen2.5-7B-Instruct
      --served-model-name Qwen2.5-7B-Instruct
      --host 0.0.0.0
      --port 8000
      --enable-chunked-prefill
      --max-num-seqs 64
      --max-num-batched-tokens 16384
      --max-model-len 16384
      --gpu-memory-utilization 0.55

  agent:
    build: .
    container_name: sentinel-agent
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - LLM_MODEL=Qwen2.5-7B-Instruct
    ports:
      - "8787:8787"
    # Optional: uncomment for GPU-accelerated Whisper/Piper
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]
