# Run on DGX Spark. Starts vLLM + voice agent.
# Prereqs: .env with ASTERISK_IP, ARI_USER, ARI_PASS; websocket_client.conf points to this host.
#
# Usage:
#   cd agent && docker compose up -d
#
# Asterisk (Linux Docker on your PBX host) must be running first. Start order: 1) Asterisk, 2) this compose.

volumes:
  vllm_cache:
  agent_model_cache:  # Piper models persist across restarts
  whisper_model_cache:  # whisper.cpp GGML models persist across rebuilds

x-vllm: &vllm
  image: nvcr.io/nvidia/vllm:26.02-py3
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"
  healthcheck:
    test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=10)"]
    interval: 15s
    timeout: 10s
    retries: 20
    start_period: 300s

services:
  whisper:
    build: ./whisper
    container_name: sentinel-whisper
    restart: unless-stopped
    environment:
      - WHISPER_MODEL=${WHISPER_CPP_MODEL:-small.en}
    volumes:
      - whisper_model_cache:/models
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      # whisper-server exposes GET /health → {"status":"ok"}
      # start_period covers first-start model download (~300 MB, can take several minutes).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 360s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  vllm:
    <<: *vllm
    container_name: sentinel-vllm
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/cache/huggingface
    volumes:
      - vllm_cache:/cache
    ports:
      - "8000:8000"
    command: >
      vllm serve Qwen/Qwen2.5-7B-Instruct
      --served-model-name Qwen2.5-7B-Instruct
      --host 0.0.0.0
      --port 8000
      --dtype bfloat16
      --enable-chunked-prefill
      --enable-prefix-caching
      --max-num-seqs 64
      --max-num-batched-tokens 32768
      --max-model-len 8192
      --gpu-memory-utilization 0.75
      --enable-auto-tool-choice
      --tool-call-parser hermes

  agent:
    build: .
    container_name: sentinel-agent
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
      whisper:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - LLM_MODEL=Qwen2.5-7B-Instruct
      - WHISPER_API_URL=http://whisper:8080/v1
      - HF_HOME=/app/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface
    volumes:
      - agent_model_cache:/app/.cache
    ports:
      - "8787:8787"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
